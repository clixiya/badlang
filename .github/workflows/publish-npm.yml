name: publish-npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (example: v1.0.0)"
        required: true
        type: string
      publish:
        description: "Publish to npm (false = dry run only)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag }}
  PACKAGE_DIR: npm
  SHOULD_PUBLISH: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Enforce package identity
        shell: bash
        run: |
          set -euo pipefail
          PKG_NAME=$(node -p "require('./${PACKAGE_DIR}/package.json').name")
          if [ "${PKG_NAME}" != "badlang" ]; then
            echo "Expected npm package name badlang, got ${PKG_NAME}."
            echo "Refusing publish to avoid uploading to unintended package names."
            exit 1
          fi

      - name: Install npm package dependencies (skip postinstall)
        working-directory: ${{ env.PACKAGE_DIR }}
        run: npm ci --ignore-scripts

      - name: Run npm package tests
        working-directory: ${{ env.PACKAGE_DIR }}
        run: npm test

      - name: Validate package archive preview
        working-directory: ${{ env.PACKAGE_DIR }}
        run: npm pack --dry-run

      - name: Verify package version matches tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./${PACKAGE_DIR}/package.json').version")
          if [ "v${VERSION}" != "${RELEASE_TAG}" ]; then
            echo "Tag ${RELEASE_TAG} does not match package version v${VERSION}"
            exit 1
          fi

      - name: Check if version already exists on npm
        id: npm_version_check
        shell: bash
        run: |
          set -euo pipefail
          PKG_NAME=$(node -p "require('./${PACKAGE_DIR}/package.json').name")
          PKG_VERSION=$(node -p "require('./${PACKAGE_DIR}/package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Package ${PKG_NAME}@${PKG_VERSION} already exists on npm; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate npm token for publish mode
        if: ${{ env.SHOULD_PUBLISH == 'true' && steps.npm_version_check.outputs.exists != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "NPM_TOKEN secret is required when publish mode is enabled."
            exit 1
          fi

      - name: Verify npm auth
        if: ${{ env.SHOULD_PUBLISH == 'true' && steps.npm_version_check.outputs.exists != 'true' }}
        working-directory: ${{ env.PACKAGE_DIR }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if ! npm whoami; then
            echo "npm auth check failed. Check that NPM_TOKEN is valid and belongs to the clixiya npm org/user."
            exit 1
          fi

      - name: Publish package to npm
        if: ${{ env.SHOULD_PUBLISH == 'true' && steps.npm_version_check.outputs.exists != 'true' }}
        working-directory: ${{ env.PACKAGE_DIR }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if npm publish --provenance; then
            echo "Published with provenance"
          else
            echo "Publish with provenance failed; retrying without provenance"
            npm publish
            echo "Published without provenance"
          fi

      - name: Verify published package is publicly visible
        if: ${{ env.SHOULD_PUBLISH == 'true' && steps.npm_version_check.outputs.exists != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          PKG_NAME=$(node -p "require('./${PACKAGE_DIR}/package.json').name")
          PKG_VERSION=$(node -p "require('./${PACKAGE_DIR}/package.json').version")

          for attempt in 1 2 3 4 5; do
            VISIBLE_VERSION=$(npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null || true)
            if [ "${VISIBLE_VERSION}" = "${PKG_VERSION}" ]; then
              echo "Public visibility verified: ${PKG_NAME}@${PKG_VERSION}"
              exit 0
            fi

            echo "Waiting for npm registry propagation (${attempt}/5)..."
            sleep 8
          done

          echo "${PKG_NAME}@${PKG_VERSION} is not publicly visible after publish."
          exit 1
